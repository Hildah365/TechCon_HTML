<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Contact Us - TechCon 2024</title>
</head>
<body>

    <!-- Header -->
    <header>
        <h1>Contact Us</h1>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="schedule.html">Schedule</a></li>
                <li><a href="register.html">Register</a></li>
            </ul>
        </nav>
    </header>

    <!-- Main Content -->
    <main>
        <article>

            <!-- Contact Information -->
            <section>
                <h2>Get in Touch</h2>
                <p>Email us: <a href="mailto:email@example.com">email@example.com</a></p>
                <p>Follow us on social media:</p>
                <ul>
                    <li><a href="https://twitter.com/TechCon2024" target="_blank">Twitter</a></li>
                    <li><a href="https://facebook.com/TechCon2024" target="_blank">Facebook</a></li>
                    <li><a href="https://linkedin.com/company/TechCon2024" target="_blank">LinkedIn</a></li>
                </ul>
            </section>

            <!-- Embedded Google Map -->
            <section>
                <h2>Venue Location</h2>
                <iframe 
                    src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3976.123456789!2d36.8219!3d-1.2921!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x182f1a1b2c3d4e5f%3A0x123456789abcdef!2sConference+Venue!5e0!3m2!1sen!2ske!4v1700000000000!5m2!1sen!2ske" 
                    width="600" 
                    height="450" 
                    style="border:0;" 
                    allowfullscreen="" 
                    loading="lazy" 
                    referrerpolicy="no-referrer-when-downgrade">
                </iframe>
            </section>

            <!-- Contact Form -->
            <section>
                <h2>Contact Us Form</h2>
                <form action="#" method="post">
                    
                    <div>
                        <label for="name">Name:</label><br>
                        <input type="text" id="name" name="name" placeholder="Your Name" required>
                    </div>
                    <br>

                    <div>
                        <label for="email">Email:</label><br>
                        <input type="email" id="email" name="email" placeholder="you@example.com" required>
                    </div>
                    <br>

                    <div>
                        <label for="message">Message:</label><br>
                        <textarea id="message" name="message" rows="5" placeholder="Write your message here..." required></textarea>
                    </div>
                    <br>

                    <div>
                        <button type="submit">Send Message</button>
                    </div>

                </form>
            </section>

        </article>
    </main>

    <!-- Footer -->
    <footer>
        <p>Copyright &copy; 2024 TechCon Conference</p>
    </footer>

</body>
</html>
